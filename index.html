<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快郵助手 (Mobile Web Mailer) - v1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col justify-between relative">

    <div class="absolute top-2 right-3 text-xs font-mono text-gray-400 select-none">
        v1.1
    </div>

    <main class="p-4 max-w-md mx-auto w-full flex-grow">
        <header class="text-center my-6">
            <h1 class="text-2xl font-bold text-gray-800">✉️ 快郵助手</h1>
            <p class="text-sm text-gray-500 mt-1">一鍵貼上，快速寄送給指定信箱</p>
        </header>

        <div id="login-section" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
            <p class="text-gray-600 mb-4">請先登入 Google 帳戶以啟用郵寄功能</p>
            <button onclick="handleAuthClick()" class="w-full bg-blue-600 text-white font-medium py-3 px-4 rounded-xl shadow-sm hover:bg-blue-700 active:scale-[0.98] transition">
                使用 Google 帳戶登入
            </button>
        </div>

        <div id="mail-section" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4 hidden">
            <div class="flex justify-between items-center border-b pb-3">
                <span id="user-email" class="text-xs text-gray-500 truncate max-w-[180px]">載入中...</span>
                <button onclick="handleSignoutClick()" class="text-xs text-red-500 hover:underline">登出</button>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">收件人 Email</label>
                <input type="email" id="to-email" placeholder="example@gmail.com" 
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none text-base">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">郵件主旨</label>
                <input type="text" id="mail-subject" placeholder="請輸入主旨 (或留空預設為：速記內容)" 
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none text-base">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium text-gray-700">郵件內容</label>
                    <button onclick="pasteFromClipboard()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 py-1 px-2 rounded-lg">
                        📋 貼上剪貼簿
                    </button>
                </div>
                <textarea id="mail-content" rows="6" placeholder="請在此輸入或貼上想要郵寄的內容..." 
                          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none text-base resize-none"></textarea>
            </div>

            <button onclick="sendEmail()" id="send-btn" class="w-full bg-emerald-600 text-white font-medium py-3 px-4 rounded-xl shadow-sm hover:bg-emerald-700 active:scale-[0.98] transition">
                🚀 立即寄出
            </button>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-gray-400">
        Mobile Mailer Tool &copy; 2026
    </footer>

    <script>
        /******************************************************************
         * ⚠️ v1.1版 核心除錯檢查點 ⚠️
         * 請將下方的 YOUR_CLIENT_ID_HERE 改成你完整的用戶端 ID。
         * 注意：結尾必須包含 .apps.googleusercontent.com 
         ******************************************************************/
        const CLIENT_ID = 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com';
        
        const SCOPES = 'https://www.googleapis.com/auth/gmail.send';
        let tokenClient;
        let accessToken = null;

        window.onload = function () {
            // 檢查是否忘記改 Client ID
            if (CLIENT_ID.includes('YOUR_CLIENT_ID_HERE')) {
                alert('【v1.1 提示】您尚未修改程式碼第 89 行的 CLIENT_ID！請替換後再測試。');
                return;
            }

            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            accessToken = tokenResponse.access_token;
                            document.getElementById('login-section').classList.add('hidden');
                            document.getElementById('mail-section').classList.remove('hidden');
                            document.getElementById('user-email').innerText = "已連結 Google API";
                            
                            const savedEmail = localStorage.getItem('saved_to_email');
                            if (savedEmail) {
                                document.getElementById('to-email').value = savedEmail;
                            }
                        }
                    },
                });
            } catch (err) {
                console.error("Google SDK 初始化失敗：", err);
            }
        };

        function handleAuthClick() {
            if (!tokenClient) {
                alert('認證組件未就緒，請檢查網路或確認 Client ID 是否正確。');
                return;
            }
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        function handleSignoutClick() {
            if (accessToken) {
                google.accounts.oauth2.revoke(accessToken, () => {
                    accessToken = null;
                    document.getElementById('login-section').classList.remove('hidden');
                    document.getElementById('mail-section').classList.add('hidden');
                });
            }
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('mail-content').value = text;
            } catch (err) {
                alert('無法自動讀取剪貼簿，請長按手動貼上。');
            }
        }

        async function sendEmail() {
            const to = document.getElementById('to-email').value.trim();
            const subject = document.getElementById('mail-subject').value.trim() || '速記內容';
            const content = document.getElementById('mail-content').value;
            const sendBtn = document.getElementById('send-btn');

            if (!to || !content) { return alert('請確認收件人與內容皆已填寫'); }

            localStorage.setItem('saved_to_email', to);
            sendBtn.disabled = true;
            sendBtn.innerText = '正在發送...';

            const utf8Subject = `=?utf-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`;
            const emailParts = [
                `To: ${to}`,
                `Subject: ${utf8Subject}`,
                'Content-Type: text/plain; charset="UTF-8"',
                'MIME-Version: 1.0',
                '',
                content
            ];
            const email = emailParts.join('\r\n');
            const base64EncodedEmail = btoa(unescape(encodeURIComponent(email))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

            try {
                const response = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ raw: base64EncodedEmail })
                });

                if (response.ok) {
                    alert('🎉 郵件發送成功！');
                    document.getElementById('mail-content').value = '';
                } else {
                    const errData = await response.json();
                    alert('發送失敗：' + (errData.error.message || '未知錯誤'));
                }
            } catch (error) {
                alert('網路異常：' + error);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = '🚀 立即寄出';
            }
        }
    </script>
</body>
</html>
